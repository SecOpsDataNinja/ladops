# Site
title: LadOps 运维笔记
subtitle: '专注系统稳定性与自动化运维实践'
description: 'Kubernetes · ELK · Ceph · 自动化运维'
keywords: 运维,Kubernetes,ELK,Ceph,Linux
author: SecOpsDataNinja
language: zh-CN
timezone: 'Asia/Shanghai'

# URL - 关键！因为是子路径部署
url: https://secopsdataninja.github.io/ladops
root: /ladops/
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: false  # 交给主题处理
prism_plugin:
  enable: false

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: redefine

# Deployment
deploy:
  type: git
  repo: https://github.com/SecOpsDataNinja/ladops.git
  branch: gh-pages
